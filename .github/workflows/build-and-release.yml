name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            archive: zip

          - rid: linux-x64
            archive: tar.gz

          - rid: osx-x64
            archive: tar.gz

          - rid: osx-arm64
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          cache: true

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: |
          dotnet publish \
            UCHModLoader.App/UCHModLoader.App.csproj \
            --output publish/${{ matrix.rid }}

      - name: Package
        run: |
          cd publish

          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip -r ../UCHModLoader-${{ matrix.rid }}.zip ${{ matrix.rid }}
          else
            tar -czf ../UCHModLoader-${{ matrix.rid }}.tar.gz ${{ matrix.rid }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UCHModLoader-${{ matrix.rid }}
          path: |
            *.zip
            *.tar.gz
          retention-days: 14

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
